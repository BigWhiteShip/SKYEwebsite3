<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Detail | SKYE Real Estate Group</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #f8f9fa; color: #1a1a2e; }
        nav { position: sticky; top: 0; z-index: 10; padding: 1rem 3rem; display: flex; justify-content: space-between; align-items: center; background: rgba(26, 26, 46, 0.95); }
        .nav-logo { height: 50px; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; }
        .nav-links a { color: #fff; text-decoration: none; font-size: .8rem; font-weight: 500; letter-spacing: .15em; text-transform: uppercase; }
        .nav-links a:hover, .nav-links a.active { color: #5CC8C8; }
        .property-shell { max-width: 1120px; margin: 0 auto; padding: 5rem 2rem; }
        .property-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 3rem; }
        .property-gallery img, .listing-photo-placeholder.large { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: #4f514f; display: grid; place-items: center; color: rgba(255,255,255,.7); }
        .property-layout { display: grid; grid-template-columns: 1fr 320px; gap: 3rem; align-items: start; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 400; line-height: 1.1; margin: 0 0 1rem; }
        .listing-price { color: #4AB0B0; font-size: 1.5rem; font-weight: 600; margin: 0 0 1rem; }
        .listing-address, .listing-mls, .property-description { color: #6c757d; line-height: 1.8; }
        .listing-stats { display: flex; flex-wrap: wrap; gap: .75rem; margin: 1.5rem 0; font-size: .82rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; }
        .listing-cta { display: inline-block; margin-top: 2rem; padding: 1rem 2rem; background: transparent; border: 2px solid #5CC8C8; color: #4AB0B0; text-decoration: none; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; font-size: .8rem; transition: all .3s ease; }
        .listing-cta:hover { background: #4AB0B0; border-color: #4AB0B0; color: #1a1a2e; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(92, 200, 200, .3); }
        .agent-panel { background: white; padding: 2rem; border-bottom: 3px solid #5CC8C8; box-shadow: 0 15px 40px rgba(0,0,0,.06); }
        .agent-panel h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 400; margin: 0 0 1rem; }
        .agent-panel a { display: block; color: #1a1a2e; text-decoration: none; margin-top: .75rem; }
        .section-label { font-size: .75rem; font-weight: 600; letter-spacing: .3em; text-transform: uppercase; color: #5CC8C8; margin: 0 0 1rem; }
        .listing-panel { background: white; padding: 4rem 3rem; text-align: center; border-bottom: 3px solid #5CC8C8; }
        footer { padding: 1.5rem 2rem; background: #4f514f; color: rgba(255,255,255,.7); text-align: center; font-size: .8rem; letter-spacing: .05em; }
        @media (max-width: 800px) { nav { padding: 1rem 1.5rem; } .nav-links { gap: 1rem; } .property-gallery { grid-template-columns: 1fr; } .property-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav>
        <a href="index.html"><img src="images/logo.png" alt="SKYE Real Estate Group" class="nav-logo"></a>
        <ul class="nav-links">
            <li><a href="company-story.html">About</a></li>
            <li><a href="current-listings.html#properties" class="active">Properties</a></li>
            <li><a href="sold-listings.html">Sold Listings</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>
    <section class="property-shell" id="propertyDetail"></section>
    <footer>&copy; 2026 SKYE Real Estate Group. All rights reserved.</footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/listings-api.js"></script>
    <script src="js/public-listings.js"></script>
    <script>loadPropertyDetail();</script>
</body>
</html>
