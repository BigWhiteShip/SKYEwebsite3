<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Listing | SKYE Admin</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=20260624-buttons">
</head>
<body>
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <img src="../images/logo.png" alt="SKYE Real Estate Group" class="admin-logo">
            <nav class="admin-nav">
                <a href="dashboard.html">Listings</a>
                <a href="listing-editor.html">Create Listing</a>
                <button type="button" onclick="AdminApp.logout()">Log Out</button>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <p class="eyebrow">Broker Review</p>
                    <h1>Review Listing</h1>
                </div>
                <a class="btn secondary" id="editLink" href="listing-editor.html" hidden>Back to Edit</a>
            </div>
            <div id="message"></div>
            <section class="panel">
                <p class="help" id="reviewHelp">This page shows a private preview of how the listing will look once published. It is not visible on the public website until the principal broker clicks Publish.</p>
                <div id="brokerActions" hidden>
                    <div class="field full">
                        <label for="brokerComments">Principal Broker Comments</label>
                        <textarea id="brokerComments" placeholder="Add comments for the submitting agent."></textarea>
                    </div>
                    <div class="button-row review-actions">
                        <button class="btn secondary" type="button" id="sendBackButton">Send Back for Edits</button>
                        <button class="btn" type="button" id="publishButton">Publish</button>
                    </div>
                </div>
                <div class="button-row" id="agentActions" hidden>
                    <a class="btn muted" id="agentEditListingButton" href="listing-editor.html">Back to Edit</a>
                    <span class="help">Only the principal broker can publish this listing.</span>
                </div>
            </section>
            <section id="brokerCommentHistory" class="panel" hidden></section>
            <section id="reviewSummary" class="panel"></section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/listings-api.js"></script>
    <script src="admin.js?v=20260624-email-warning"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const listingId = params.get('id');
        const message = document.getElementById('message');
        const summary = document.getElementById('reviewSummary');
        const brokerActions = document.getElementById('brokerActions');
        const agentActions = document.getElementById('agentActions');
        const reviewHelp = document.getElementById('reviewHelp');
        const brokerComments = document.getElementById('brokerComments');
        const commentHistory = document.getElementById('brokerCommentHistory');
        const sendBackButton = document.getElementById('sendBackButton');
        const publishButton = document.getElementById('publishButton');
        let currentListing = null;
        const editLink = document.getElementById('editLink');
        editLink.href = `listing-editor.html?id=${listingId || ''}`;
        document.getElementById('agentEditListingButton').href = `listing-editor.html?id=${listingId || ''}`;
        message.innerHTML = AdminApp.setupWarning();

        async function loadReview() {
            if (!SkyeListings.client || !listingId) {
                summary.innerHTML = '<h2>Listing review pending setup</h2><p class="help">Connect Supabase and open this page with a listing ID to review live data.</p>';
                return;
            }
            const profile = await AdminApp.getCurrentProfile();
            const canApprove = AdminApp.isPrincipalBroker(profile);
            brokerActions.hidden = !canApprove;
            agentActions.hidden = canApprove;
            editLink.hidden = canApprove;
            reviewHelp.textContent = canApprove
                ? 'Review the private preview below. Approve & Publish makes this listing visible on the public listings page.'
                : 'This is a private preview. The principal broker must approve and publish it before it appears on the public listings page.';

            const { data, error } = await SkyeListings.client.from('listings').select('*').eq('id', listingId).single();
            if (error) {
                summary.innerHTML = `<div class="message error">${error.message}</div>`;
                return;
            }
            currentListing = data;
            const events = await AdminApp.getApprovalEvents(listingId);
            const commentEvents = events.filter(event => event.notes);
            const latestEvent = events[0];
            const statusLabel = data.status === 'unpublished' && latestEvent && latestEvent.event_type === 'changes_requested'
                ? 'Needs Edits'
                : SkyeListings.statusLabels[data.status];
            commentHistory.hidden = !commentEvents.length;
            if (commentEvents.length) {
                commentHistory.innerHTML = `
                    <h2>Broker Comments</h2>
                    <div class="comment-list">
                        ${commentEvents.map(event => `
                            <article class="comment-item">
                                <span class="status-pill">${event.event_type === 'published' ? 'Published' : 'Needs Edits'}</span>
                                <p>${AdminApp.escapeHtml(event.notes)}</p>
                                <p class="help">${new Date(event.created_at).toLocaleString()}</p>
                            </article>
                        `).join('')}
                    </div>
                `;
            }
            const photos = await AdminApp.getListingPhotos(listingId);
            const address = data.hide_address
                ? 'Address available upon request'
                : [data.address, data.city, data.state, data.zip_code].filter(Boolean).join(', ');
            const photoGallery = photos.length
                ? photos.map(photo => `<img src="${photo.public_url}" alt="${photo.alt_text}">`).join('')
                : '<span>SKYE</span>';

            summary.innerHTML = `
                <div class="button-row" style="margin-bottom: 1.5rem;">
                    <span class="status-pill">${statusLabel}</span>
                    <span class="help">Private preview only</span>
                </div>
                <article class="preview-shell">
                    <div class="preview-hero">
                        ${photoGallery}
                    </div>
                    <div class="preview-body">
                        <main>
                            <p class="preview-price">${SkyeListings.formatMoney(data.price)}</p>
                            <h2 class="preview-title">${data.title}</h2>
                            <p class="preview-address">${address}</p>
                            <div class="preview-stats">
                                <span>${data.bedrooms} Beds</span>
                                <span>${data.bathrooms} Baths</span>
                                <span>${Number(data.interior_sq_ft).toLocaleString()} Sq Ft</span>
                                <span>${data.lot_size} Lot</span>
                            </div>
                            <p class="preview-copy">${data.description}</p>
                            <p class="preview-meta">MLS # ${data.mls_number}</p>
                            <p><a href="${data.zillow_url}" target="_blank" rel="noopener noreferrer">View full Zillow listing for complete property details</a></p>
                        </main>
                        <aside class="preview-agent">
                            <p class="eyebrow">Listing Agent</p>
                            <h2>${data.agent_name}</h2>
                            <a href="tel:${data.agent_office_phone}">Office: ${data.agent_office_phone}</a>
                            <a href="tel:${data.agent_mobile_phone}">Mobile: ${data.agent_mobile_phone}</a>
                            <a href="mailto:${data.agent_email}">${data.agent_email}</a>
                        </aside>
                    </div>
                </article>
            `;
        }

        sendBackButton.addEventListener('click', async () => {
            try {
                sendBackButton.disabled = true;
                const emailResult = await AdminApp.requestEdits(listingId, currentListing, brokerComments.value);
                brokerComments.value = '';
                message.innerHTML = emailResult && emailResult.sent === false
                    ? '<div class="message">Listing sent back to the agent for edits. The email could not be sent automatically because the Edge Function is not reachable.</div>'
                    : '<div class="message">Listing sent back to the agent for edits. An email was sent to the agent.</div>';
                loadReview();
            } catch (error) {
                message.innerHTML = `<div class="message error">${error.message}</div>`;
            } finally {
                sendBackButton.disabled = false;
            }
        });

        publishButton.addEventListener('click', async () => {
            try {
                publishButton.disabled = true;
                await AdminApp.approveAndPublish(listingId, brokerComments.value);
                brokerComments.value = '';
                message.innerHTML = '<div class="message">Listing approved and published. The submitting agent will see the published status.</div>';
                loadReview();
            } catch (error) {
                message.innerHTML = `<div class="message error">${error.message}</div>`;
            } finally {
                publishButton.disabled = false;
            }
        });

        loadReview();
    </script>
</body>
</html>
