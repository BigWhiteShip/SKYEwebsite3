<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Listing | SKYE Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-shell">
        <aside class="admin-sidebar">
            <img src="../images/logo.png" alt="SKYE Real Estate Group" class="admin-logo">
            <nav class="admin-nav">
                <a href="dashboard.html">Listings</a>
                <a href="listing-editor.html">Create Listing</a>
                <button type="button" onclick="AdminApp.logout()">Log Out</button>
            </nav>
        </aside>
        <main class="admin-main">
            <div class="admin-header">
                <div>
                    <p class="eyebrow">Broker Review</p>
                    <h1>Review Listing</h1>
                </div>
                <a class="btn secondary" id="editLink" href="listing-editor.html">Back to Edit</a>
            </div>
            <div id="message"></div>
            <section class="panel">
                <p class="help">This review page is where the broker can publish, unpublish, mark sold, or archive. The public PDP preview is available after Supabase is connected and a listing slug exists.</p>
                <div class="button-row">
                    <button class="btn" data-status="published">Publish</button>
                    <button class="btn secondary" data-status="unpublished">Unpublish</button>
                    <button class="btn secondary" data-status="sold">Mark Sold</button>
                    <button class="btn danger" data-status="archived">Archived - Expired - Unsold</button>
                </div>
            </section>
            <section id="reviewSummary" class="panel"></section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/listings-api.js"></script>
    <script src="admin.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const listingId = params.get('id');
        const message = document.getElementById('message');
        const summary = document.getElementById('reviewSummary');
        document.getElementById('editLink').href = `listing-editor.html?id=${listingId || ''}`;
        message.innerHTML = AdminApp.setupWarning();

        async function loadReview() {
            if (!SkyeListings.client || !listingId) {
                summary.innerHTML = '<h2>Listing review pending setup</h2><p class="help">Connect Supabase and open this page with a listing ID to review live data.</p>';
                return;
            }
            await SkyeListings.requireSession();
            const { data, error } = await SkyeListings.client.from('listings').select('*').eq('id', listingId).single();
            if (error) {
                summary.innerHTML = `<div class="message error">${error.message}</div>`;
                return;
            }
            summary.innerHTML = `
                <p class="status-pill">${SkyeListings.statusLabels[data.status]}</p>
                <h2>${data.title}</h2>
                <p class="help">${data.description}</p>
                <p><strong>${SkyeListings.formatMoney(data.price)}</strong></p>
                <p>${data.hide_address ? 'Address available upon request' : [data.address, data.city, data.state, data.zip_code].filter(Boolean).join(', ')}</p>
                <p>MLS # ${data.mls_number}</p>
                <p>Agent: ${data.agent_name} | ${data.agent_office_phone} | ${data.agent_mobile_phone} | ${data.agent_email}</p>
                <p><a href="../property.html?slug=${data.slug}" target="_blank">Open public preview</a></p>
            `;
        }

        document.querySelectorAll('[data-status]').forEach(button => {
            button.addEventListener('click', async () => {
                try {
                    await AdminApp.updateStatus(listingId, button.dataset.status);
                    message.innerHTML = '<div class="message">Status updated.</div>';
                    loadReview();
                } catch (error) {
                    message.innerHTML = `<div class="message error">${error.message}</div>`;
                }
            });
        });

        loadReview();
    </script>
</body>
</html>
