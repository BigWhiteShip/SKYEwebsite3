<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYE Admin Login</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=20260624-buttons">
</head>
<body class="auth-page">
    <main class="auth-card">
        <img src="../images/logo.png" alt="SKYE Real Estate Group" class="auth-logo">
        <p class="eyebrow">Admin</p>
        <h1>Sign In</h1>
        <div id="message"></div>
        <form id="loginForm">
            <label for="email">Username / Email</label>
            <input id="email" name="email" type="email" placeholder="name@skyegroup.realestate" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required>
            <div class="button-row" style="margin-top: 1.5rem;">
                <button class="btn" type="submit">Log In</button>
                <button class="btn secondary" type="button" id="forgotPassword">Forgot Password</button>
            </div>
            <p class="help">Forgot username? Contact the principal broker. Usernames use the agent email format: name@skyegroup.realestate.</p>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/listings-api.js"></script>
    <script src="admin.js?v=20260624-status-fix"></script>
    <script>
        const message = document.getElementById('message');
        message.innerHTML = AdminApp.setupWarning();
        document.getElementById('loginForm').addEventListener('submit', async event => {
            event.preventDefault();
            try {
                await AdminApp.login(email.value, password.value);
            } catch (error) {
                message.innerHTML = `<div class="message error">${error.message}</div>`;
            }
        });
        document.getElementById('forgotPassword').addEventListener('click', async () => {
            try {
                await AdminApp.resetPassword(email.value);
                message.innerHTML = '<div class="message">Password reset email sent if the account exists.</div>';
            } catch (error) {
                message.innerHTML = `<div class="message error">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
