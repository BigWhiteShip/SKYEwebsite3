<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password | SKYE Admin</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/images/favicon-96x96.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=20260623-approval">
</head>
<body class="auth-page">
    <main class="auth-card">
        <img src="../images/logo.png" alt="SKYE Real Estate Group" class="auth-logo">
        <p class="eyebrow">Admin Invite</p>
        <h1>Create Password</h1>
        <div id="message"></div>
        <form id="passwordForm">
            <label for="password">New Password</label>
            <input id="password" name="password" type="password" minlength="8" required>
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" required>
            <div class="button-row" style="margin-top: 1.5rem;">
                <button class="btn" type="submit">Save Password</button>
                <a class="btn secondary" href="login.html">Back to Login</a>
            </div>
            <p class="help">Use the invite link from your email. If this page says the link is expired, ask the admin to resend the invitation.</p>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="../js/listings-api.js"></script>
    <script src="admin.js?v=20260623-approval"></script>
    <script>
        const message = document.getElementById('message');
        const form = document.getElementById('passwordForm');
        message.innerHTML = AdminApp.setupWarning();

        form.addEventListener('submit', async event => {
            event.preventDefault();
            if (password.value !== confirmPassword.value) {
                message.innerHTML = '<div class="message error">Passwords do not match.</div>';
                return;
            }

            try {
                await AdminApp.setPassword(password.value);
                message.innerHTML = '<div class="message">Password saved. Redirecting to the admin dashboard...</div>';
                window.setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 900);
            } catch (error) {
                message.innerHTML = `<div class="message error">${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
